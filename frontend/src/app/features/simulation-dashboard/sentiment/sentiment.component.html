<div class="animate-fade-in">

  <!-- Section Header -->
  <div class="mb-6">
    <h2 style="font-size: 22px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em;">
      Sentiment &amp; Plattformen
    </h2>
    <p style="font-size: 14px; color: var(--ink-3); margin-top: 6px; max-width: 640px;">
      Querschnittsanalyse — Plattform-Verteilung und Beteiligung über die Zeit.
    </p>
  </div>

  @if (loading()) {
    <div class="py-16 text-center" role="status">
      <span class="badge badge-primary">
        <i class="pi pi-spin pi-spinner"></i>
        Wird ausgewertet
      </span>
    </div>
  } @else {
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

      <!-- Plattform-Verteilung -->
      <section class="card" style="padding: 24px;" role="region" aria-label="Plattform-Verteilung">
        <header class="flex items-center justify-between mb-4">
          <h3 style="font-size: 16px; font-weight: 600; color: var(--ink);">
            Plattform-Verteilung
          </h3>
          <span style="font-family: var(--font-mono); font-size: 12px; color: var(--ink-3);">
            {{ totalPosts() }} Beiträge
          </span>
        </header>
        <div echarts [options]="platformChart()" class="h-[320px]"
             role="img" aria-label="Plattform-Verteilung Donut"></div>
      </section>

      <!-- Aktivitäts-Linie -->
      <section class="card" style="padding: 24px;" role="region" aria-label="Persona-Aktivitaet">
        <header class="flex items-center justify-between mb-4">
          <h3 style="font-size: 16px; font-weight: 600; color: var(--ink);">
            Aktive Personas im Verlauf
          </h3>
          <span style="font-family: var(--font-mono); font-size: 12px; color: var(--ink-3);">
            Tick-Verlauf
          </span>
        </header>
        <div echarts [options]="activityChart()" class="h-[320px]"
             role="img" aria-label="Persona-Aktivitaet im Zeitverlauf"></div>
      </section>
    </div>
  }
</div>
